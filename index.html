<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator PRO</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
button,input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button{background:#ff004f;color:white;}
video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
#recordBtn{background:#00c853;}
#stopBtn{background:#d50000;}
</style>
</head>

<body>

<h2>🎬 Reel Creator PRO</h2>

<!-- 🔥 IMPORTANT: muted removed -->
<video id="preview" autoplay playsinline controls></video>

<button onclick="startCamera()">📷 Start Camera</button>

<button id="recordBtn">🎥 Start Recording</button>
<button id="stopBtn" disabled>⏹ Stop</button>

<hr>

<h3>🎵 Select Music</h3>
<select id="musicSelect">
  <option value="">-- Voice Only --</option>
</select>

<button id="previewMusicBtn">▶️ Preview Music</button>

<hr>

<h3>🖼 Slideshow</h3>
<input type="file" id="imageInput" multiple accept="image/*">
<button onclick="previewImageVideo()">Create Slideshow</button>

<hr>

<input type="file" id="video">

<p id="status">📍 Ready</p>

<button onclick="uploadReel()">🚀 Upload Reel</button>

<script>

const API = "https://business-reels-backend.onrender.com";

/* ELEMENTS */
const preview = document.getElementById("preview");
const statusText = document.getElementById("status");
const musicSelect = document.getElementById("musicSelect");
const previewBtn = document.getElementById("previewMusicBtn");

/* GLOBALS */
let mediaRecorder;
let chunks = [];
let recordedBlob = null;
let musicAudio = null;
let audioCtx = null;
let audioSource = null;
let audioDest = null;

/* =========================
   LOAD MUSIC
========================= */
async function loadMusic(){
  const res = await fetch(API + "/music-list");
  const data = await res.json();

  musicSelect.innerHTML = `<option value="">-- Voice Only --</option>`;

  data.forEach(m => {
    let opt = document.createElement("option");
    opt.value = m.url;
    opt.innerText = m.name;
    musicSelect.appendChild(opt);
  });
}
loadMusic();

/* =========================
   MUSIC PLAYER (FINAL FIX)
========================= */
previewBtn.onclick = async () => {

  if (!musicSelect.value) return alert("Select music first");

  try {

    let url = musicSelect.value.startsWith("http")
      ? musicSelect.value
      : API + musicSelect.value;

    // STOP
    if (musicAudio && !musicAudio.paused) {
      musicAudio.pause();
      musicAudio.currentTime = 0;
      previewBtn.innerText = "▶️ Preview Music";
      return;
    }

    // INIT AUDIO CONTEXT
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    await audioCtx.resume();

    musicAudio = new Audio(url);
    musicAudio.crossOrigin = "anonymous";
    musicAudio.loop = true;
    musicAudio.volume = 1;

    audioSource = audioCtx.createMediaElementSource(musicAudio);
    audioDest = audioCtx.createMediaStreamDestination();

    audioSource.connect(audioDest);
    audioSource.connect(audioCtx.destination);

    await musicAudio.play();

    previewBtn.innerText = "⏸ Stop Music";

  } catch (err) {
    console.log(err);
    alert("❌ Music play failed");
  }
};

/* =========================
   SLIDESHOW (HD + AUDIO FINAL)
========================= */
async function previewImageVideo(){

  const files = document.getElementById("imageInput").files;
  if(!files.length) return alert("Select images");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 1080;
  canvas.height = 1920;

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  let images = [];

  for(let file of files){
    let img = new Image();
    img.src = URL.createObjectURL(file);
    await new Promise(r => img.onload = r);
    images.push(img);
  }

  const canvasStream = canvas.captureStream(30);

  let finalStream;

  if (audioDest && musicAudio) {
    musicAudio.currentTime = 0;

    finalStream = new MediaStream([
      ...canvasStream.getVideoTracks(),
      ...audioDest.stream.getAudioTracks()
    ]);
  } else {
    finalStream = canvasStream;
  }

  const recorder = new MediaRecorder(finalStream, {
    mimeType: "video/webm;codecs=vp9,opus"
  });

  let data = [];

  recorder.ondataavailable = e => {
    if(e.data.size > 0) data.push(e.data);
  };

  recorder.start();

  let i = 0;

  function draw(){

    let img = images[i];

    let ratio = Math.max(canvas.width/img.width, canvas.height/img.height);

    let w = img.width * ratio;
    let h = img.height * ratio;

    let x = (canvas.width - w)/2;
    let y = (canvas.height - h)/2;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,x,y,w,h);

    setTimeout(()=>{
      i++;
      if(i < images.length){
        draw();
      } else {
        recorder.stop();
      }
    },2000);
  }

  draw();

  recorder.onstop = () => {

    recordedBlob = new Blob(data, {type:"video/webm"});

    preview.srcObject = null;
    preview.src = URL.createObjectURL(recordedBlob);

    preview.muted = false;
    preview.volume = 1;

    preview.play();

    statusText.innerText = "✅ Reel Ready (HD + Sound)";
  };
}

/* =========================
   UPLOAD
========================= */
async function uploadReel(){

  const token = localStorage.getItem("token");
  if(!token) return alert("Login first");

  let file = recordedBlob || document.getElementById("video").files[0];
  if(!file) return alert("No media selected");

  const fd = new FormData();

  fd.append("video", file);
  fd.append("musicUrl", musicSelect.value || "");

  const res = await fetch(API + "/reels/upload", {
    method:"POST",
    headers:{
      Authorization:"Bearer " + token
    },
    body: fd
  });

  const data = await res.json();

  if(!res.ok) return alert("❌ " + data.error);

  alert("✅ Upload Success 🚀");
}

</script>

</body>
</html>
