<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator Pro</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
button,input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button{background:#ff004f;color:white;}
video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
#recordBtn{background:#00c853;}
#stopBtn{background:#d50000;}
</style>
</head>

<body>

<h2>🎬 Reel Creator PRO</h2>

<video id="preview" autoplay muted playsinline></video>

<button onclick="startCamera()">📷 Start Camera</button>
<button id="recordBtn">🎥 Start Recording</button>
<button id="stopBtn" disabled>⏹ Stop</button>

<hr>

<h3>🎵 Select Music</h3>
<select id="musicSelect">
  <option value="">-- Voice Only --</option>
</select>

<button id="previewMusicBtn">▶️ Preview Music</button>

<hr>

<h3>🖼 Multi Image Slideshow</h3>
<input type="file" id="imageInput" accept="image/*" multiple>
<button onclick="previewImageVideo()">👀 Preview Slideshow</button>

<hr>

<input type="file" id="video">

<p id="status">📍 Detecting location...</p>

<button onclick="uploadReel()">🚀 Upload</button>
<button onclick="generateAIReel()">🤖 Auto AI Reel</button>
<script>
const API = "https://business-reels-backend.onrender.com";

const FIXED_WHATSAPP = "919473549700";
const FIXED_BUSINESS = "Webnestic Tech Up";
const FIXED_WEBSITE = "https://webnestic-tech-up.vercel.app/";

const MUSIC_LIST = [
  {name:"Song 1", url:"music/song1.mp3"},
  {name:"Song 2", url:"music/song2.mp3"},
  {name:"Song 3", url:"music/song3.mp3"},
  {name:"Song 4", url:"music/song4.mp3"},
  {name:"Song 5", url:"music/song5.mp3"}
];

let lat="", lng="";
let stream, mediaRecorder;
let chunks=[];
let recordedBlob=null;
let musicAudio = new Audio();

const preview = document.getElementById("preview");
const statusText = document.getElementById("status");
const musicSelect = document.getElementById("musicSelect");
const previewBtn = document.getElementById("previewMusicBtn");

let isPlaying=false;

/* MUSIC LOAD */
MUSIC_LIST.forEach(m=>{
  let opt=document.createElement("option");
  opt.value=m.url;
  opt.innerText=m.name;
  musicSelect.appendChild(opt);
});

musicSelect.onchange=()=>{
  musicAudio.src=musicSelect.value || "";
};

/* MUSIC PREVIEW */
previewBtn.onclick=()=>{
  if(!musicAudio.src) return alert("Select music first");

  if(!isPlaying){
    musicAudio.currentTime=0;
    musicAudio.play();
    previewBtn.innerText="⏸ Stop";
    isPlaying=true;
  }else{
    musicAudio.pause();
    previewBtn.innerText="▶️ Preview Music";
    isPlaying=false;
  }
};

/* LOCATION */
navigator.geolocation.getCurrentPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;
  statusText.innerText="📍 Location detected";
});

/* CAMERA */
async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  preview.srcObject = stream;
}

/* RECORD */
recordBtn.onclick=()=>{
  if(!stream) return alert("Start camera first");

  chunks=[];

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable=e=>{
    if(e.data.size>0) chunks.push(e.data);
  };

  mediaRecorder.onstop=()=>{
    recordedBlob=new Blob(chunks,{type:"video/webm"});
    preview.srcObject=null;
    preview.src=URL.createObjectURL(recordedBlob);
    preview.controls=true;
  };

  mediaRecorder.start();

  recordBtn.disabled=true;
  stopBtn.disabled=false;
};

/* STOP */
stopBtn.onclick=()=>{
  mediaRecorder.stop();
  recordBtn.disabled=false;
  stopBtn.disabled=true;
};
async function generateAIReel(){

  const file = document.getElementById("imageInput").files[0];
  if(!file) return alert("Select image first");

  const fd = new FormData();
  fd.append("image", file);
  fd.append("businessName", FIXED_BUSINESS);

  statusText.innerText="🤖 AI is generating reel...";

  const res = await fetch(API + "/generate-reel",{
    method:"POST",
    body:fd
  });

  const data = await res.json();

  if(!res.ok) return alert("❌ AI failed");

  preview.src = data.videoUrl;
  preview.controls = true;

  statusText.innerText="🔥 AI Reel Ready";
                                  }
/* MULTI IMAGE SLIDESHOW (IMPROVED) */
async function imageToVideo(files){

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width = 720;
  canvas.height = 1280;

  let images=[];

  for(let file of files){
    let img=new Image();
    img.src=URL.createObjectURL(file);
    await new Promise(r=>img.onload=r);
    images.push(img);
  }

  const stream=canvas.captureStream(30);

  const audioCtx=new AudioContext();
  const dest=audioCtx.createMediaStreamDestination();

  let tempAudio=new Audio(musicAudio.src);

  if(tempAudio.src){
    const source=audioCtx.createMediaElementSource(tempAudio);
    source.connect(dest);
    source.connect(audioCtx.destination);
    tempAudio.play();
  }

  const finalStream=new MediaStream([
    ...stream.getVideoTracks(),
    ...dest.stream.getAudioTracks()
  ]);

  const recorder=new MediaRecorder(finalStream);
  let data=[];

  recorder.ondataavailable=e=>{
    if(e.data.size>0) data.push(e.data);
  };

  recorder.start();

  let index=0;
  let duration=2000;
  let lastTime=Date.now();

  function draw(){

    let img = images[index];

    // cover fit
    let ratio = Math.max(canvas.width/img.width, canvas.height/img.height);
    let newW = img.width * ratio;
    let newH = img.height * ratio;

    let x = (canvas.width - newW)/2;
    let y = (canvas.height - newH)/2;

    ctx.drawImage(img,x,y,newW,newH);

    if(Date.now()-lastTime > duration){
      index++;
      lastTime=Date.now();
    }

    if(index < images.length){
      requestAnimationFrame(draw);
    }else{
      recorder.stop();
      tempAudio.pause();
    }
  }

  draw();

  return new Promise(res=>{
    recorder.onstop=()=>{
      res(new Blob(data,{type:"video/webm"}));
    };
  });
}

/* PREVIEW */
async function previewImageVideo(){

  const files=document.getElementById("imageInput").files;

  if(!files.length) return alert("Select images");

  statusText.innerText="⏳ Creating slideshow...";

  const blob=await imageToVideo(files);

  preview.srcObject=null;
  preview.src=URL.createObjectURL(blob);
  preview.controls=true;

  recordedBlob=blob;

  statusText.innerText="✅ Preview Ready";
}

/* UPLOAD */
async function uploadReel(){

  const token=localStorage.getItem("token");
  if(!token) return alert("Login first");

  let file;

  if(recordedBlob){
    file=new File([recordedBlob],"reel.webm");
  }else{
    file=document.getElementById("video").files[0];
  }

  if(!file) return alert("No media");

  const fd=new FormData();
  fd.append("video",file);
  fd.append("businessName",FIXED_BUSINESS);
  fd.append("website",FIXED_WEBSITE);
  fd.append("whatsapp",FIXED_WHATSAPP);
  fd.append("lat",lat);
  fd.append("lng",lng);

  const res=await fetch(API+"/reels/upload",{
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:fd
  });

  const data=await res.json();

  if(!res.ok) return alert("❌ "+data.error);

  alert("✅ Upload Success 🚀");
}
</script>

</body>
</html>
