<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Reel Upload</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
  text-align:center;
}

input,button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  background:#ff004f;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

/* 🔥 Loader */
#loader{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  display:none;
  margin-top:10px;
}

#progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ff88,#00c853);
  transition: width 0.3s ease;
}

#status{
  margin-top:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>🎬 Upload Reel</h2>

<input type="file" id="videoFile" accept="video/*">

<button onclick="uploadVideo()">🚀 Upload</button>

<div id="loader">
  <div id="progress"></div>
</div>

<p id="status"></p>

<script>

const API = "https://business-reels-backend.onrender.com";

// 🔥 FIXED DATA
const BUSINESS_NAME = "Webnestic Tech Up";
const WEBSITE = "https://webnestic-tech-up.vercel.app/";
const WHATSAPP = "919473549700";

function uploadVideo(){

  const file = document.getElementById("videoFile").files[0];
  const status = document.getElementById("status");
  const loader = document.getElementById("loader");
  const progress = document.getElementById("progress");

  if(!file){
    alert("Please select video");
    return;
  }

  loader.style.display = "block";
  progress.style.width = "0%";
  status.innerText = "Uploading...";

  const fd = new FormData();
  fd.append("video", file);

  // 🔥 AUTO DATA
  fd.append("businessName", BUSINESS_NAME);
  fd.append("website", WEBSITE);
  fd.append("whatsapp", WHATSAPP);

  const xhr = new XMLHttpRequest();

  xhr.open("POST", API + "/reels/upload", true);

  const token = localStorage.getItem("token");
  if(token){
    xhr.setRequestHeader("Authorization", "Bearer " + token);
  }

  // 🔥 REAL PROGRESS TRACK
  xhr.upload.onprogress = function(e){
    if(e.lengthComputable){
      const percent = (e.loaded / e.total) * 100;
      progress.style.width = percent + "%";
      status.innerText = "Uploading " + Math.floor(percent) + "%";
    }
  };

  xhr.onload = function(){
    loader.style.display = "none";

    if(xhr.status === 200){
      progress.style.width = "100%";
      status.innerText = "✅ Upload Complete 🚀";
    }else{
      status.innerText = "❌ Upload Failed";
    }
  };

  xhr.onerror = function(){
    loader.style.display = "none";
    status.innerText = "❌ Upload Error";
  };

  xhr.send(fd);
}

</script>

</body>
</html>
