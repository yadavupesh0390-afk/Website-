<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Upload</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  box-sizing: border-box;
}

button {
  background: #ff004f;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🚀 Reel Upload</h2>

<input type="file" id="video">

<p id="locationStatus">📍 Detecting location...</p>

<button id="uploadBtn">UPLOAD</button>

<script>

const API = "https://business-reels-backend.onrender.com";

// ✅ FIXED DATA
const FIXED_WHATSAPP = "919473549700";
const FIXED_BUSINESS = "Webnestic Tech Up";
const FIXED_WEBSITE = "https://webnestic-tech-up.vercel.app/";

let city = "";
let lat = "";
let lng = "";

/* ================= TOKEN ================= */
function getToken(){
  return localStorage.getItem("token");
}

/* ================= LOCATION ================= */
function getLocation() {

  if (!navigator.geolocation) {
    document.getElementById("locationStatus").innerText = "❌ Location not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {

    lat = pos.coords.latitude;
    lng = pos.coords.longitude;

    city = "Unknown";

    console.log("📍 LAT:", lat, "LNG:", lng);

    document.getElementById("locationStatus").innerText = "📍 Location detected";

  }, () => {
    document.getElementById("locationStatus").innerText = "❌ Location denied";
  });
}

getLocation();

/* ================= UPLOAD ================= */
async function uploadReel() {

  console.log("🚀 UPLOAD CLICKED");

  const token = getToken();

  if (!token) {
    alert("❌ Please login first");
    return;
  }

  const file = document.getElementById("video").files[0];

  if (!file) {
    alert("❌ Select video file");
    return;
  }

  if (file.size > 100 * 1024 * 1024) {
    alert("❌ Max file size 100MB");
    return;
  }

  const formData = new FormData();
  formData.append("video", file);

  // ✅ FIXED VALUES (NO INPUT)
  formData.append("businessName", FIXED_BUSINESS);
  formData.append("website", FIXED_WEBSITE);
  formData.append("whatsapp", FIXED_WHATSAPP);
  formData.append("city", city);
  formData.append("lat", lat);
  formData.append("lng", lng);

  console.log("📦 Sending...");

  try {

    const res = await fetch(API + "/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    const data = await res.json();

    console.log("RESPONSE:", data);

    if (!res.ok) {
      alert("❌ " + (data.error || "Upload failed"));
      return;
    }

    alert("✅ Upload Success 🚀");

  } catch (err) {
    console.log("ERROR:", err);
    alert("Upload failed");
  }
}

/* ================= BUTTON ================= */
document.getElementById("uploadBtn").addEventListener("click", uploadReel);

</script>

</body>
</html>
