<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Upload</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  box-sizing: border-box;
}

button {
  background: #ff004f;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🚀 Reel Upload</h2>

<input type="file" id="video">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Website">

<p id="locationStatus">📍 Detecting location...</p>

<button id="uploadBtn">UPLOAD</button>

<script>

const API = "https://business-reels-backend.onrender.com";

// ✅ FIXED WHATSAPP
const FIXED_WHATSAPP = "919473549700";

let city = "";
let lat = "";
let lng = "";

/* ================= LOAD TOKEN ================= */
function getToken(){
  return localStorage.getItem("token");
}

/* ================= GET LOCATION ================= */
function getLocation() {

  if (!navigator.geolocation) {
    document.getElementById("locationStatus").innerText = "❌ Location not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {

    lat = pos.coords.latitude;
    lng = pos.coords.longitude;

    console.log("📍 LAT:", lat, "LNG:", lng);

    // 👉 fallback city
    city = "Unknown";

    document.getElementById("locationStatus").innerText = "📍 Location detected";

  }, (err) => {
    console.log("LOCATION ERROR:", err);
    document.getElementById("locationStatus").innerText = "❌ Location permission denied";
  });
}

getLocation();

/* ================= UPLOAD ================= */
async function uploadReel() {

  console.log("🚀 UPLOAD CLICKED");

  const token = getToken();

  if (!token) {
    alert("❌ Please login first");
    return;
  }

  const file = document.getElementById("video").files[0];

  if (!file) {
    alert("❌ Select video file");
    return;
  }

  if (file.size > 100 * 1024 * 1024) {
    alert("❌ Max file size 100MB");
    return;
  }

  const businessName = document.getElementById("businessName").value.trim();

  if (!businessName) {
    alert("❌ Business name required");
    return;
  }

  const website = document.getElementById("website").value.trim();

  const formData = new FormData();
  formData.append("video", file);
  formData.append("businessName", businessName);
  formData.append("website", website);

  // ✅ AUTO VALUES
  formData.append("whatsapp", FIXED_WHATSAPP);
  formData.append("city", city);
  formData.append("lat", lat);
  formData.append("lng", lng);

  console.log("📦 Sending request...");

  try {

    const res = await fetch(API + "/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token // ✅ FIXED
      },
      body: formData
    });

    console.log("📡 STATUS:", res.status);

    const text = await res.text();
    console.log("RAW:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      data = { error: text };
    }

    if (!res.ok) {
      alert("❌ " + (data.error || "Upload failed"));
      return;
    }

    alert("✅ Upload Success 🚀");

  } catch (err) {
    console.log("❌ ERROR:", err);
    alert("Upload failed");
  }
}

/* ================= BUTTON ================= */
document.getElementById("uploadBtn").addEventListener("click", uploadReel);

</script>

</body>
</html>
