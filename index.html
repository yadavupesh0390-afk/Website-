<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
button,input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
button{background:#ff004f;color:white;}
video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}
#recordBtn{background:#00c853;}
#stopBtn{background:#d50000;}
</style>
</head>

<body>

<h2>🎬 Reel Creator (Final)</h2>

<video id="preview" autoplay muted playsinline></video>

<button onclick="startCamera()">📷 Start Camera</button>
<button id="recordBtn">🎥 Start Recording</button>
<button id="stopBtn" disabled>⏹ Stop</button>

<hr>

<h3>🎵 Select Music</h3>
<select id="musicSelect">
  <option value="">-- Voice Only --</option>
</select>

<button id="previewMusicBtn">▶️ Preview Music</button>

<hr>

<h3>🖼 Image to Video</h3>
<input type="file" id="imageInput" accept="image/*">
<button onclick="previewImageVideo()">👀 Preview Image Video</button>

<hr>

<input type="file" id="video">

<p id="status">📍 Detecting location...</p>

<button onclick="uploadReel()">🚀 Upload</button>

<script>
const API = "https://business-reels-backend.onrender.com";

const FIXED_WHATSAPP = "919473549700";
const FIXED_BUSINESS = "Webnestic Tech Up";
const FIXED_WEBSITE = "https://webnestic-tech-up.vercel.app/";

const MUSIC_LIST = [
  {name:"Song 1", url:"music/song1.mp3"},
  {name:"Song 2", url:"music/song2.mp3"},
  {name:"Song 3", url:"music/song3.mp3"},
  {name:"Song 4", url:"music/song4.mp3"},
  {name:"Song 5", url:"music/song5.mp3"},
  {name:"Song 6", url:"music/song6.mp3"},
  {name:"Song 7", url:"music/song7.mp3"},
  {name:"Song 8", url:"music/song8.mp3"},
  {name:"Song 9", url:"music/song9.mp3"},
  {name:"Song 10", url:"music/song10.mp3"}
];

let lat="", lng="";
let stream, mediaRecorder;
let chunks=[];
let recordedBlob=null;
let musicAudio = new Audio();

const preview = document.getElementById("preview");
const statusText = document.getElementById("status");
const musicSelect = document.getElementById("musicSelect");
const previewBtn = document.getElementById("previewMusicBtn");

let isPlaying=false;

/* MUSIC LOAD */
MUSIC_LIST.forEach(m=>{
  let opt=document.createElement("option");
  opt.value=m.url;
  opt.innerText=m.name;
  musicSelect.appendChild(opt);
});

musicSelect.onchange=()=>{
  musicAudio.src=musicSelect.value || "";
};

/* MUSIC PREVIEW */
previewBtn.onclick=()=>{
  if(!musicAudio.src) return alert("Select music first");

  if(!isPlaying){
    musicAudio.currentTime=0;
    musicAudio.play();
    previewBtn.innerText="⏸ Stop";
    isPlaying=true;
  }else{
    musicAudio.pause();
    previewBtn.innerText="▶️ Preview Music";
    isPlaying=false;
  }
};

/* LOCATION */
navigator.geolocation.getCurrentPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;
  statusText.innerText="📍 Location detected";
});

/* CAMERA */
async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  preview.srcObject = stream;

  const ctx = new AudioContext();
  const dest = ctx.createMediaStreamDestination();

  const mic = ctx.createMediaStreamSource(stream);
  mic.connect(dest);

  if(musicAudio.src){
    const musicSource = ctx.createMediaElementSource(musicAudio);
    musicSource.connect(dest);
    musicSource.connect(ctx.destination);
  }

  const finalStream = new MediaStream([
    ...stream.getVideoTracks(),
    ...dest.stream.getAudioTracks()
  ]);

  mediaRecorder = new MediaRecorder(finalStream);

  mediaRecorder.ondataavailable=e=>{
    if(e.data.size>0) chunks.push(e.data);
  };

  mediaRecorder.onstop=()=>{
    recordedBlob=new Blob(chunks,{type:"video/webm"});
    preview.srcObject=null;
    preview.src=URL.createObjectURL(recordedBlob);
    preview.controls=true;
  };
}

/* RECORD */
recordBtn.onclick=()=>{
  if(!mediaRecorder) return alert("Start camera first");

  chunks=[];
  mediaRecorder.start();

  if(musicAudio.src){
    musicAudio.currentTime=0;
    musicAudio.play();
  }

  recordBtn.disabled=true;
  stopBtn.disabled=false;
};

/* STOP */
stopBtn.onclick=()=>{
  mediaRecorder.stop();
  musicAudio.pause();

  recordBtn.disabled=false;
  stopBtn.disabled=true;
};

/* IMAGE TO VIDEO (FIXED) */
async function imageToVideo(file){

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  const img=new Image();
  img.src=URL.createObjectURL(file);
  await new Promise(r=>img.onload=r);

  canvas.width=img.width;
  canvas.height=img.height;

  const stream=canvas.captureStream(30);

  const audioCtx=new AudioContext();
  const dest=audioCtx.createMediaStreamDestination();

  let tempAudio=new Audio(musicAudio.src);

  if(tempAudio.src){
    const musicSource=audioCtx.createMediaElementSource(tempAudio);
    musicSource.connect(dest);
    musicSource.connect(audioCtx.destination);

    tempAudio.currentTime=0;
    tempAudio.play();
  }

  const finalStream=new MediaStream([
    ...stream.getVideoTracks(),
    ...dest.stream.getAudioTracks()
  ]);

  const recorder=new MediaRecorder(finalStream);
  let data=[];

  recorder.ondataavailable=e=>data.push(e.data);

  recorder.start();

  let start=Date.now();

  function draw(){
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    if(Date.now()-start < 5000){
      requestAnimationFrame(draw);
    }else{
      recorder.stop();
      tempAudio.pause();
    }
  }

  draw();

  return new Promise(res=>{
    recorder.onstop=()=>{
      res(new Blob(data,{type:"video/webm"}));
    };
  });
}

/* IMAGE PREVIEW */
async function previewImageVideo(){
  const file=document.getElementById("imageInput").files[0];
  if(!file) return alert("Select image");

  statusText.innerText="⏳ Generating preview...";

  const blob=await imageToVideo(file);

  preview.srcObject=null;
  preview.src=URL.createObjectURL(blob);
  preview.controls=true;

  recordedBlob=blob;

  statusText.innerText="✅ Preview Ready";
}

/* UPLOAD */
async function uploadReel(){

  const token=localStorage.getItem("token");
  if(!token) return alert("Login first");

  let file;

  if(recordedBlob){
    file=new File([recordedBlob],"reel.webm");
  }else{
    file=document.getElementById("video").files[0];
  }

  if(!file) return alert("No media");

  const fd=new FormData();
  fd.append("video",file);
  fd.append("businessName",FIXED_BUSINESS);
  fd.append("website",FIXED_WEBSITE);
  fd.append("whatsapp",FIXED_WHATSAPP);
  fd.append("lat",lat);
  fd.append("lng",lng);

  const res=await fetch(API+"/reels/upload",{
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:fd
  });

  const data=await res.json();

  if(!res.ok) return alert("❌ "+data.error);

  alert("✅ Upload Success 🚀");
}
</script>

</body>
</html>
