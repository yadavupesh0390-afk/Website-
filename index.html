<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator PRO</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

button,input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{background:#ff004f;color:white;}
video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

#recordBtn{background:#00c853;}
#stopBtn{background:#d50000;}
</style>
</head>

<body>

<h2>🎬 Reel Creator PRO</h2>

<video id="preview" autoplay muted playsinline></video>

<button onclick="startCamera()">📷 Start Camera</button>
<button id="recordBtn">🎥 Start Recording</button>
<button id="stopBtn" disabled>⏹ Stop</button>

<hr>

<h3>🖼 AI Reel (Image)</h3>
<input type="file" id="imageInput" accept="image/*">
<button onclick="generateAIReel()">🤖 Generate AI Reel</button>

<hr>

<h3>🎥 Manual Upload Video</h3>
<input type="file" id="videoInput" accept="video/*">

<hr>

<p id="status">📍 Ready</p>

<button onclick="uploadReel()">🚀 Upload Reel</button>

<script>

const API = "https://business-reels-backend.onrender.com";

const FIXED_WHATSAPP = "919473549700";
const FIXED_BUSINESS = "Webnestic Tech Up";
const FIXED_WEBSITE = "https://webnestic-tech-up.vercel.app/";

let stream, mediaRecorder;
let recordedBlob = null;

const preview = document.getElementById("preview");
const statusText = document.getElementById("status");

/* STATUS */
function setStatus(msg){
  statusText.innerText = msg;
}

/* CAMERA */
async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  preview.srcObject = stream;
}

/* RECORD */
document.getElementById("recordBtn").onclick = () => {

  if(!stream) return alert("Start camera first");

  let chunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    if(e.data.size > 0) chunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(chunks, {type:"video/webm"});
    preview.srcObject = null;
    preview.src = URL.createObjectURL(recordedBlob);
    preview.controls = true;
  };

  mediaRecorder.start();

  document.getElementById("recordBtn").disabled = true;
  document.getElementById("stopBtn").disabled = false;
};

/* STOP */
document.getElementById("stopBtn").onclick = () => {
  mediaRecorder.stop();
  document.getElementById("recordBtn").disabled = false;
  document.getElementById("stopBtn").disabled = true;
};

/* AI REEL */
async function generateAIReel(){

  const file = document.getElementById("imageInput").files[0];
  if(!file) return alert("Select image first");

  const fd = new FormData();
  fd.append("image", file);
  fd.append("businessName", FIXED_BUSINESS);

  setStatus("🤖 AI generating...");

  try{
    const res = await fetch(API + "/ai/ai-reel", {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    if(!res.ok) throw new Error(data.error);

    preview.src = data.videoUrl;
    preview.play().catch(()=>{});
    preview.controls = true;

    setStatus("🔥 AI Reel Ready");

  }catch(err){
    setStatus("❌ " + err.message);
  }
}

/* UPLOAD (AI + MANUAL BOTH) */
async function uploadReel(){

  const token = localStorage.getItem("token");
  if(!token) return alert("Login required");

  let file =
    recordedBlob ||
    document.getElementById("videoInput").files[0];

  if(!file) return alert("No file selected");

  const fd = new FormData();
  fd.append("video", file);
  fd.append("businessName", FIXED_BUSINESS);
  fd.append("website", FIXED_WEBSITE);
  fd.append("whatsapp", FIXED_WHATSAPP);

  setStatus("🚀 Uploading...");

  const res = await fetch(API + "/reels/upload-reel", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    },
    body: fd
  });

  const data = await res.json();

  if(!res.ok){
    setStatus("❌ Upload failed");
    return alert(data.error);
  }

  setStatus("✅ Upload Success 🚀");
  alert("Uploaded successfully!");
}

</script>

</body>
</html>
