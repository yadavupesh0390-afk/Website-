<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Upload</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  background: #ff004f;
  color: white;
  cursor: pointer;
}

video {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

#recordBtn{
  background:#00c853;
}

#stopBtn{
  background:#d50000;
}
</style>
</head>

<body>

<h2>🎬 Reel Upload (Instagram Style)</h2>

<!-- CAMERA PREVIEW -->
<video id="preview" autoplay muted playsinline></video>

<button id="recordBtn">🎥 Start Recording</button>
<button id="stopBtn" disabled>⏹ Stop Recording</button>

<hr>

<input type="file" id="video">

<p id="locationStatus">📍 Detecting location...</p>

<button id="uploadBtn">🚀 Upload Reel</button>

<script>
const API = "https://business-reels-backend.onrender.com";

// ✅ FIXED DATA
const FIXED_WHATSAPP = "919473549700";
const FIXED_BUSINESS = "Webnestic Tech Up";
const FIXED_WEBSITE = "https://webnestic-tech-up.vercel.app/";

let city = "";
let lat = "";
let lng = "";

let mediaRecorder;
let recordedChunks = [];
let recordedBlob = null;

/* ================= TOKEN ================= */
function getToken(){
  return localStorage.getItem("token");
}

/* ================= LOCATION ================= */
function getLocation() {
  if (!navigator.geolocation) return;

  navigator.geolocation.getCurrentPosition((pos) => {
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    city = "Unknown";

    document.getElementById("locationStatus").innerText = "📍 Location detected";

  }, () => {
    document.getElementById("locationStatus").innerText = "❌ Location denied";
  });
}
getLocation();

/* ================= CAMERA SETUP ================= */
async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    });

    preview.srcObject = stream;

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = (e)=>{
      if(e.data.size > 0){
        recordedChunks.push(e.data);
      }
    };

    mediaRecorder.onstop = ()=>{
      recordedBlob = new Blob(recordedChunks, { type: "video/webm" });
      preview.srcObject = null;
      preview.src = URL.createObjectURL(recordedBlob);
      preview.controls = true;
    };

  }catch(err){
    alert("Camera permission denied ❌");
  }
}

startCamera();

/* ================= RECORD ================= */
recordBtn.onclick = ()=>{
  recordedChunks = [];
  mediaRecorder.start();

  recordBtn.disabled = true;
  stopBtn.disabled = false;
};

stopBtn.onclick = ()=>{
  mediaRecorder.stop();

  recordBtn.disabled = false;
  stopBtn.disabled = true;
};

/* ================= UPLOAD ================= */
async function uploadReel(){

  const token = getToken();

  if (!token) return alert("Login first ❌");

  let file;

  // 🎥 PRIORITY: RECORDED VIDEO
  if(recordedBlob){
    file = new File([recordedBlob], "reel.webm");
  }else{
    file = document.getElementById("video").files[0];
  }

  if (!file) return alert("Record or select video ❌");

  const formData = new FormData();
  formData.append("video", file);

  formData.append("businessName", FIXED_BUSINESS);
  formData.append("website", FIXED_WEBSITE);
  formData.append("whatsapp", FIXED_WHATSAPP);
  formData.append("city", city);
  formData.append("lat", lat);
  formData.append("lng", lng);

  try{
    const res = await fetch(API + "/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    const data = await res.json();

    if (!res.ok) return alert("❌ " + data.error);

    alert("✅ Upload Success 🚀");

  }catch(err){
    alert("Upload failed ❌");
  }
}

/* ================= BUTTON ================= */
uploadBtn.onclick = uploadReel;

</script>

</body>
</html>
