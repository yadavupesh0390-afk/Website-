<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Reel Upload Test</title>

<style>
body { font-family: Arial; padding: 20px; background: #111; color: #fff; }
input, button { margin: 5px 0; padding: 10px; width: 100%; }
button { background: #ff004f; color: white; border: none; border-radius: 5px; cursor: pointer; }
hr { margin: 20px 0; border: 0.5px solid #555; }
</style>
</head>

<body>

<h2>Business Reel Upload Test</h2>

<h3>Login / Register</h3>
<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="city" placeholder="City (optional)">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<h3>Upload Reel</h3>
<input type="text" id="videoUrl" placeholder="Video URL (MP4)">
<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Business Website URL">
<input type="text" id="category" placeholder="Category (education/shop/service/tech)">
<input type="text" id="whatsapp" placeholder="WhatsApp Number (91XXXXXXXXXX)">
<button onclick="uploadReel()">Upload Reel</button>

<script>
const API = "https://business-reels-backend.onrender.com";
let token = "";

// TEST VIDEO
const testVideo = "https://www.w3schools.com/html/mov_bbb.mp4";

// REGISTER
async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const city = document.getElementById("city").value;

  const res = await fetch(API + "/auth/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password, city })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/auth/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.token){
    token = data.token;
    localStorage.setItem("token", token); // save login
    alert("Login Successful ✅");
  } else {
    alert("Login Failed ❌: " + (data.error || "Unknown"));
  }
}

// AUTO LOAD TOKEN
if(localStorage.getItem("token")){
  token = localStorage.getItem("token");
}

// UPLOAD REEL
async function uploadReel() {
  if(!token){
    alert("Please login first!");
    return;
  }

  const videoUrl = document.getElementById("videoUrl").value || testVideo;
  const businessName = document.getElementById("businessName").value || "Test Business";
  const website = document.getElementById("website").value || "https://example.com";
  const category = document.getElementById("category").value || "shop";
  const whatsapp = document.getElementById("whatsapp").value;

  const res = await fetch(API + "/reels/upload", {
    method: "POST",
    headers: { 
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ videoUrl, businessName, website, category, whatsapp })
  });

  const data = await res.json();
  alert(data.message || data.error);
}
</script>

</body>
</html>
