<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Reel Upload</title>

<style>
body { font-family: Arial; padding: 20px; background: #111; color: #fff; }
input, button { margin: 5px 0; padding: 10px; width: 100%; box-sizing: border-box; }
button { background: #ff004f; color: white; border: none; border-radius: 5px; cursor: pointer; }
button:hover { opacity: 0.9; }
hr { margin: 20px 0; border: 0.5px solid #555; }
</style>
</head>

<body>

<h2>Business Reel Upload</h2>

<!-- LOGIN -->
<h3>Login / Register</h3>
<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="city" placeholder="City (optional)">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<!-- UPLOAD -->
<h3>Upload Reel</h3>

<input type="file" id="video" accept="video/*">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Business Website URL">
<input type="text" id="category" placeholder="Category">
<input type="text" id="whatsapp" placeholder="WhatsApp Number">

<button onclick="uploadReel()">Upload Reel</button>

<script>
const API = "https://business-reels-backend.onrender.com";
let token = localStorage.getItem("token") || "";

/* ================= REGISTER ================= */
async function register() {
  try {
    const res = await fetch(API + "/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        city: document.getElementById("city").value
      })
    });

    const data = await res.json();
    alert(data.message || data.error);

  } catch (err) {
    console.log(err);
    alert("Register failed ❌");
  }
}

/* ================= LOGIN ================= */
async function login() {
  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (data.token) {
      token = data.token;
      localStorage.setItem("token", token);
      alert("Login Successful ✅");
    } else {
      alert(data.error || "Login failed ❌");
    }

  } catch (err) {
    console.log(err);
    alert("Login error ❌");
  }
}

/* ================= UPLOAD REEL (FIXED) ================= */
async function uploadReel() {
  console.log("UPLOAD CLICKED 🚀");

  try {
    if (!token || token === "undefined") {
      alert("Please login first!");
      return;
    }

    const fileInput = document.getElementById("video");

    if (!fileInput || !fileInput.files.length) {
      alert("Please select video!");
      return;
    }

    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append("video", file);
    formData.append("businessName", document.getElementById("businessName").value);
    formData.append("website", document.getElementById("website").value);
    formData.append("category", document.getElementById("category").value);
    formData.append("whatsapp", document.getElementById("whatsapp").value);

    console.log("Sending request to server...");

    const res = await fetch(API + "/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    console.log("STATUS:", res.status);

    const text = await res.text();
    console.log("RAW RESPONSE:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      console.log("JSON parse error");
      data = { error: text };
    }

    console.log("FINAL RESPONSE:", data);

    alert(data.message || data.error || "Unknown response");

  } catch (err) {
    console.log("UPLOAD ERROR:", err);
    alert("Upload failed ❌ Check console");
  }
}
</script>

</body>
</html>
