<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Reel Upload</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  margin: 5px 0;
  padding: 10px;
  width: 100%;
  box-sizing: border-box;
}

button {
  background: #ff004f;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

hr {
  margin: 20px 0;
  border: 0.5px solid #555;
}
</style>
</head>

<body>

<h2>Business Reel Upload</h2>

<!-- LOGIN -->
<h3>Login / Register</h3>

<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="city" placeholder="City (optional)">

<button type="button" onclick="register()">Register</button>
<button type="button" onclick="login()">Login</button>

<hr>

<!-- UPLOAD -->
<h3>Upload Reel</h3>

<input type="file" id="video" accept="video/*">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Business Website URL">
<input type="text" id="category" placeholder="Category">
<input type="text" id="whatsapp" placeholder="WhatsApp Number">

<button type="button" onclick="uploadReel()">Upload Reel</button>

<script>

const API = "https://business-reels-backend.onrender.com";
let token = null;

// load token safely
try {
  token = localStorage.getItem("token");
} catch (e) {
  token = null;
}

/* ================= REGISTER ================= */
async function register() {
  console.log("REGISTER CLICK");

  try {
    const res = await fetch(API + "/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        city: document.getElementById("city").value
      })
    });

    const data = await res.json();
    alert(data.message || data.error || "Done");

  } catch (err) {
    console.log("REGISTER ERROR:", err);
    alert("Register failed ❌");
  }
}

/* ================= LOGIN ================= */
async function login() {
  console.log("LOGIN CLICK");

  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (data.token) {
      token = data.token;
      localStorage.setItem("token", token);
      alert("Login Successful ✅");
      console.log("TOKEN SAVED");
    } else {
      alert(data.error || "Login failed ❌");
    }

  } catch (err) {
    console.log("LOGIN ERROR:", err);
    alert("Login error ❌");
  }
}
  function validateUploadForm() {
  const file = document.getElementById("video").files[0];
  const businessName = document.getElementById("businessName").value.trim();
  const website = document.getElementById("website").value.trim();
  const category = document.getElementById("category").value.trim();
  const whatsapp = document.getElementById("whatsapp").value.trim();

  if (!file) {
    alert("❌ Please select a video file");
    return false;
  }

  if (file.size > 100 * 1024 * 1024) {
    alert("❌ File too large (Max 100MB allowed)");
    return false;
  }

  if (!businessName) {
    alert("❌ Business name required");
    return false;
  }

  if (!website) {
    alert("❌ Website required");
    return false;
  }

  if (!category) {
    alert("❌ Category required");
    return false;
  }

  if (!whatsapp) {
    alert("❌ WhatsApp number required");
    return false;
  }

  console.log("✅ All validation passed");
  return true;
                  }

/* ================= UPLOAD ================= */
async function uploadReel() {

  console.log("UPLOAD CLICKED 🚀");

  // 👉 FRONTEND ERROR CHECK
  if (!validateUploadForm()) return;

  try {
    const file = document.getElementById("video").files[0];

    const formData = new FormData();
    formData.append("video", file);
    formData.append("businessName", document.getElementById("businessName").value);
    formData.append("website", document.getElementById("website").value);
    formData.append("category", document.getElementById("category").value);
    formData.append("whatsapp", document.getElementById("whatsapp").value);

    console.log("📦 Sending request to server...");

    const res = await fetch(API + "/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    console.log("📡 STATUS:", res.status);

    const data = await res.json();

    if (!res.ok) {
      alert("❌ Server Error: " + (data.error || "Unknown error"));
      console.log("SERVER ERROR:", data);
      return;
    }

    alert("✅ Upload Success");
    console.log("SUCCESS:", data);

  } catch (err) {
    console.log("❌ FRONTEND ERROR:", err);
    alert("Upload failed (check console)");
  }
}

</script>

</body>
</html>
