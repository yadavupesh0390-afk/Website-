<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Reel Upload</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
  text-align:center;
}

input,button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  background:#ff004f;
  color:white;
  font-size:16px;
}

/* 🔥 Loader Line */
#loader{
  width:100%;
  height:6px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  display:none;
}

#progress{
  height:100%;
  width:0%;
  background:#00ff88;
  animation: loading 1s linear infinite;
}

@keyframes loading{
  0%{width:0%;}
  50%{width:80%;}
  100%{width:100%;}
}

#status{
  margin-top:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>🎬 Upload Reel</h2>

<input type="file" id="videoFile" accept="video/*">

<button onclick="uploadVideo()">🚀 Upload</button>

<div id="loader">
  <div id="progress"></div>
</div>

<p id="status"></p>

<script>

const API = "https://business-reels-backend.onrender.com";

async function uploadVideo(){

  const file = document.getElementById("videoFile").files[0];
  const status = document.getElementById("status");
  const loader = document.getElementById("loader");

  if(!file){
    alert("Please select video");
    return;
  }

  status.innerText = "Uploading...";
  loader.style.display = "block";

  const fd = new FormData();
  fd.append("video", file);

  try{

    const res = await fetch(API + "/reels/upload", {
      method:"POST",
      body: fd
    });

    const data = await res.json();

    loader.style.display = "none";

    if(res.ok){
      status.innerText = "✅ Upload Complete";
    }else{
      status.innerText = "❌ Upload Failed";
    }

  }catch(err){
    loader.style.display = "none";
    status.innerText = "❌ Error Uploading";
  }
}

</script>

</body>
</html>
