<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Debug Final</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: #ff004f;
  border: none;
  color: white;
}
</style>
</head>

<body>

<h2>🚀 UPLOAD DEBUG FINAL</h2>

<input type="file" id="video">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Website">
<input type="text" id="category" placeholder="Category">
<input type="text" id="whatsapp" placeholder="WhatsApp">

<button onclick="uploadReel()">UPLOAD TEST</button>

<script>

/* ================= SAFE TOKEN LOAD ================= */
let token = null;

function loadToken() {
  try {
    token = localStorage.getItem("token");
    console.log("🔑 TOKEN LOADED:", token);
  } catch (e) {
    token = null;
    console.log("❌ TOKEN ERROR");
  }
}

loadToken();

/* ================= UPLOAD FUNCTION ================= */
async function uploadReel() {

  console.log("🟢 STEP 1: BUTTON CLICK");
  alert("STEP 1 OK");

  try {

    console.log("🟡 STEP 2: FUNCTION START");
    alert("STEP 2 OK");

    loadToken();

    if (!token || token === "null" || token === "undefined") {
      console.log("🔴 STEP 3: NO TOKEN");
      alert("❌ Login required (token missing)");
      return;
    }

    const file = document.getElementById("video").files[0];

    if (!file) {
      console.log("🔴 STEP 4: NO FILE");
      alert("❌ Select file first");
      return;
    }

    console.log("🟣 STEP 5: FILE READY", file.name);

    const formData = new FormData();
    formData.append("video", file);
    formData.append("businessName", document.getElementById("businessName").value);
    formData.append("website", document.getElementById("website").value);
    formData.append("category", document.getElementById("category").value);
    formData.append("whatsapp", document.getElementById("whatsapp").value);

    console.log("📦 STEP 6: SENDING REQUEST");

    const response = await fetch("https://business-reels-backend.onrender.com/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    console.log("📡 STEP 7 STATUS:", response.status);

    const text = await response.text();
    console.log("📩 RAW RESPONSE:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      data = { error: text };
    }

    console.log("📦 FINAL DATA:", data);

    if (!response.ok) {
      alert("❌ SERVER ERROR: " + (data.error || "Upload failed"));
      return;
    }

    alert("✅ UPLOAD SUCCESS");

  } catch (err) {
    console.log("❌ GLOBAL ERROR:", err);
    alert("Request failed (check console)");
  }
}

</script>

</body>
</html>
