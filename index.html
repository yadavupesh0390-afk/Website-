<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Upload</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: red;
  color: white;
  border: none;
}
</style>
</head>

<body>

<h2>UPLOAD DEBUG TEST</h2>

<input type="file" id="video">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Website">
<input type="text" id="category" placeholder="Category">
<input type="text" id="whatsapp" placeholder="WhatsApp">

<button onclick="uploadReel()">UPLOAD TEST</button>

<script>

let token = localStorage.getItem("token");

/* ================= CLICK TEST ================= */
function uploadReel() {

  console.log("🟢 STEP 1: BUTTON CLICKED");
  alert("STEP 1: Button clicked");

  try {

    console.log("🟡 STEP 2: FUNCTION ENTERED");
    alert("STEP 2: Function entered");

    if (!token) {
      console.log("🔴 STEP 3: NO TOKEN");
      alert("No token found");
      return;
    }

    const file = document.getElementById("video").files[0];

    if (!file) {
      console.log("🔴 STEP 4: NO FILE");
      alert("No file selected");
      return;
    }

    console.log("🟣 STEP 5: FILE OK");

    const formData = new FormData();
    formData.append("video", file);
    formData.append("businessName", document.getElementById("businessName").value);
    formData.append("website", document.getElementById("website").value);
    formData.append("category", document.getElementById("category").value);
    formData.append("whatsapp", document.getElementById("whatsapp").value);

    console.log("📦 STEP 6: FORM DATA READY");

    fetch("https://business-reels-backend.onrender.com/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    })
    .then(res => {
      console.log("📡 STEP 7: RESPONSE RECEIVED", res.status);
      return res.json();
    })
    .then(data => {
      console.log("📩 STEP 8: DATA:", data);
      alert("UPLOAD DONE");
    })
    .catch(err => {
      console.log("❌ STEP ERROR:", err);
      alert("Request failed");
    });

  } catch (err) {
    console.log("❌ GLOBAL ERROR:", err);
    alert("Function crash");
  }
}

</script>

</body>
</html>
