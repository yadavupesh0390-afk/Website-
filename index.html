<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Reel Upload</title>

<style>
body { font-family: Arial; padding: 20px; background: #111; color: #fff; }
input, button { margin: 5px 0; padding: 10px; width: 100%; }
button { background: #ff004f; color: white; border: none; border-radius: 5px; cursor: pointer; }
hr { margin: 20px 0; border: 0.5px solid #555; }
</style>
</head>

<body>

<h2>Business Reel Upload</h2>

<h3>Login / Register</h3>
<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="city" placeholder="City (optional)">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<h3>Upload Reel</h3>

<!-- 🔥 FILE UPLOAD -->
<input type="file" id="video">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Business Website URL">
<input type="text" id="category" placeholder="Category">
<input type="text" id="whatsapp" placeholder="WhatsApp Number (91XXXXXXXXXX)">

<button onclick="uploadReel()">Upload Reel</button>

<script>
const API = "https://business-reels-backend.onrender.com";
let token = "";

// REGISTER
async function register() {
  const res = await fetch(API + "/auth/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value,
      city: city.value
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

// LOGIN
async function login() {
  const res = await fetch(API + "/auth/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    token = data.token;
    localStorage.setItem("token", token);
    alert("Login Successful ✅");
  } else {
    alert(data.error);
  }
}

// AUTO TOKEN
if(localStorage.getItem("token")){
  token = localStorage.getItem("token");
}

// 🔥 UPLOAD FUNCTION (IMPORTANT)
async function uploadReel() {
  if(!token){
    alert("Login first!");
    return;
  }

  const file = document.getElementById("video").files[0];
  if(!file){
    alert("Please select video!");
    return;
  }

  const formData = new FormData();
  formData.append("video", file);
  formData.append("businessName", document.getElementById("businessName").value);
  formData.append("website", document.getElementById("website").value);
  formData.append("category", document.getElementById("category").value);
  formData.append("whatsapp", document.getElementById("whatsapp").value);

  const res = await fetch(API + "/reels/upload", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    },
    body: formData
  });

  const data = await res.json();
  alert(data.message || data.error);
}
</script>

</body>
</html>
