<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator Pro</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

button,input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{background:#ff004f;color:white;}

video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

#recordBtn{background:#00c853;}
#stopBtn{background:#d50000;}
</style>
</head>

<body>

<h2>🎬 Reel Creator PRO</h2>

<video id="preview" autoplay muted playsinline></video>

<button onclick="startCamera()">📷 Start Camera</button>
<button id="recordBtn">🎥 Start Recording</button>
<button id="stopBtn" disabled>⏹ Stop</button>

<hr>

<h3>🎵 Select Music (From Server)</h3>
<select id="musicSelect">
  <option value="">Loading music...</option>
</select>

<button id="previewMusicBtn">▶️ Preview Music</button>

<hr>

<h3>🖼 Multi Image Slideshow</h3>
<input type="file" id="imageInput" accept="image/*" multiple>
<button onclick="previewImageVideo()">👀 Preview Slideshow</button>

<hr>

<input type="file" id="video">

<p id="status">📍 Detecting location...</p>

<button onclick="uploadReel()">🚀 Upload</button>

<script>

const API = "https://business-reels-backend.onrender.com";

let lat="", lng="";
let stream, mediaRecorder;
let chunks=[];
let recordedBlob=null;
let musicAudio = new Audio();
let isPlaying=false;

/* ELEMENTS */
const preview = document.getElementById("preview");
const statusText = document.getElementById("status");
const musicSelect = document.getElementById("musicSelect");
const previewBtn = document.getElementById("previewMusicBtn");

/* =========================
   🎵 LOAD MUSIC FROM BACKEND
========================= */
async function loadMusic(){
  try{
    const res = await fetch(API + "/music");
    const data = await res.json();

    musicSelect.innerHTML = `<option value="">-- Voice Only --</option>`;

    data.forEach(m=>{
      let opt = document.createElement("option");
      opt.value = m.url;
      opt.innerText = m.name;
      musicSelect.appendChild(opt);
    });

  }catch(err){
    musicSelect.innerHTML = `<option>Music load failed</option>`;
  }
}

loadMusic();

/* MUSIC SELECT */
musicSelect.onchange = ()=>{
  musicAudio.src = musicSelect.value || "";
};

/* MUSIC PREVIEW */
previewBtn.onclick = ()=>{
  if(!musicAudio.src) return alert("Select music first");

  if(!isPlaying){
    musicAudio.currentTime=0;
    musicAudio.play();
    previewBtn.innerText="⏸ Stop";
    isPlaying=true;
  }else{
    musicAudio.pause();
    previewBtn.innerText="▶️ Preview Music";
    isPlaying=false;
  }
};

/* LOCATION */
navigator.geolocation.getCurrentPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;
  statusText.innerText="📍 Location detected";
});

/* CAMERA */
async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  preview.srcObject = stream;
}

/* RECORD */
recordBtn.onclick=()=>{
  if(!stream) return alert("Start camera first");

  chunks=[];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable=e=>{
    if(e.data.size>0) chunks.push(e.data);
  };

  mediaRecorder.onstop=()=>{
    recordedBlob=new Blob(chunks,{type:"video/webm"});
    preview.srcObject=null;
    preview.src=URL.createObjectURL(recordedBlob);
    preview.controls=true;
  };

  mediaRecorder.start();

  recordBtn.disabled=true;
  stopBtn.disabled=false;
};

stopBtn.onclick=()=>{
  mediaRecorder.stop();
  recordBtn.disabled=false;
  stopBtn.disabled=true;
};

/* SLIDESHOW */
async function imageToVideo(files){

  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");

  canvas.width=720;
  canvas.height=1280;

  let images=[];

  for(let file of files){
    let img=new Image();
    img.src=URL.createObjectURL(file);
    await new Promise(r=>img.onload=r);
    images.push(img);
  }

  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream);
  let data=[];

  recorder.ondataavailable=e=>{
    if(e.data.size>0) data.push(e.data);
  };

  recorder.start();

  let index=0;
  let duration=2000;

  function draw(){
    let img=images[index];

    let ratio=Math.max(canvas.width/img.width, canvas.height/img.height);
    let w=img.width*ratio;
    let h=img.height*ratio;

    let x=(canvas.width-w)/2;
    let y=(canvas.height-h)/2;

    ctx.drawImage(img,x,y,w,h);

    setTimeout(()=>{
      index++;
      if(index<images.length){
        draw();
      }else{
        recorder.stop();
      }
    },duration);
  }

  draw();

  return new Promise(res=>{
    recorder.onstop=()=>{
      res(new Blob(data,{type:"video/webm"}));
    };
  });
}

/* PREVIEW */
async function previewImageVideo(){
  const files=document.getElementById("imageInput").files;

  if(!files.length) return alert("Select images");

  statusText.innerText="⏳ Creating slideshow...";

  const blob=await imageToVideo(files);

  preview.srcObject=null;
  preview.src=URL.createObjectURL(blob);
  preview.controls=true;

  recordedBlob=blob;

  statusText.innerText="✅ Ready";
}

/* UPLOAD */
async function uploadReel(){

  const token=localStorage.getItem("token");
  if(!token) return alert("Login first");

  let file = recordedBlob || document.getElementById("video").files[0];

  if(!file) return alert("No media");

  const fd=new FormData();
  fd.append("video",file);
  fd.append("lat",lat);
  fd.append("lng",lng);

  const res=await fetch(API+"/reels/upload",{
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:fd
  });

  const data=await res.json();

  if(!res.ok) return alert("❌ "+data.error);

  alert("✅ Upload Success 🚀");
}
</script>

</body>
</html>
