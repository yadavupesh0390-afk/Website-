<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Creator</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

button,input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{background:#ff004f;color:white;}

video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

#recordBtn{background:#00c853;}
#stopBtn{background:#d50000;}
</style>
</head>

<body>

<h2>🎬 Reel Creator (With Music)</h2>

<video id="preview" autoplay muted playsinline></video>

<button onclick="startCamera()">📷 Start Camera</button>
<button id="recordBtn">🎥 Start Recording</button>
<button id="stopBtn" disabled>⏹ Stop</button>

<hr>

<h3>🎵 Select Music</h3>
<select id="musicSelect">
  <option value="">-- No Music (Voice Only) --</option>
</select>

<button id="previewMusicBtn">▶️ Preview Music</button>

<hr>

<input type="file" id="video">

<p id="status">📍 Detecting location...</p>

<button onclick="uploadReel()">🚀 Upload</button>

<script>
const API = "https://business-reels-backend.onrender.com";

const FIXED_WHATSAPP = "919473549700";
const FIXED_BUSINESS = "Webnestic Tech Up";
const FIXED_WEBSITE = "https://webnestic-tech-up.vercel.app/";

const MUSIC_LIST = [
  {name:"Song 1", url:"music/song1.mp3"},
  {name:"Song 2", url:"music/song2.mp3"},
  {name:"Song 3", url:"music/song3.mp3"},
  {name:"Song 4", url:"music/song4.mp3"},
  {name:"Song 5", url:"music/song5.mp3"},
  {name:"Song 6", url:"music/song6.mp3"},
  {name:"Song 7", url:"music/song7.mp3"},
  {name:"Song 8", url:"music/song8.mp3"},
  {name:"Song 9", url:"music/song9.mp3"},
  {name:"Song 10", url:"music/song10.mp3"}
];

let lat="", lng="", city="";
let stream, mediaRecorder;
let chunks=[];
let recordedBlob=null;
let musicAudio = new Audio();

let audioContext, destination, micSource, musicSource;

const musicSelect = document.getElementById("musicSelect");
const statusText = document.getElementById("status");
const previewBtn = document.getElementById("previewMusicBtn");

let isPlaying = false;

/* ================= MUSIC LOAD ================= */
MUSIC_LIST.forEach((m)=>{
  let opt = document.createElement("option");
  opt.value = m.url;
  opt.innerText = m.name;
  musicSelect.appendChild(opt);
});

musicSelect.onchange = ()=>{
  if(musicSelect.value){
    musicAudio.src = musicSelect.value;
    statusText.innerText = "🎵 Music Selected";
  }else{
    musicAudio.src = "";
    statusText.innerText = "🎤 Voice only mode";
  }
};

/* ================= MUSIC PREVIEW ================= */
previewBtn.onclick = ()=>{
  if(!musicAudio.src){
    alert("❌ Select music first");
    return;
  }

  if(!isPlaying){
    musicAudio.currentTime = 0;
    musicAudio.play();
    previewBtn.innerText = "⏸ Stop Preview";
    isPlaying = true;
  }else{
    musicAudio.pause();
    previewBtn.innerText = "▶️ Preview Music";
    isPlaying = false;
  }
};

/* ================= LOCATION ================= */
navigator.geolocation.getCurrentPosition(pos=>{
  lat = pos.coords.latitude;
  lng = pos.coords.longitude;
  statusText.innerText = "📍 Location detected";
});

/* ================= CAMERA ================= */
async function startCamera(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    });

    preview.srcObject = stream;

    audioContext = new AudioContext();
    destination = audioContext.createMediaStreamDestination();

    micSource = audioContext.createMediaStreamSource(stream);
    micSource.connect(destination);

    if(musicAudio.src){
      musicSource = audioContext.createMediaElementSource(musicAudio);
      musicSource.connect(destination);
      musicSource.connect(audioContext.destination);
    }

    const finalStream = new MediaStream([
      ...stream.getVideoTracks(),
      ...destination.stream.getAudioTracks()
    ]);

    mediaRecorder = new MediaRecorder(finalStream);

    mediaRecorder.ondataavailable = e=>{
      if(e.data.size>0) chunks.push(e.data);
    };

    mediaRecorder.onstop = ()=>{
      recordedBlob = new Blob(chunks,{type:"video/webm"});
      preview.srcObject = null;
      preview.src = URL.createObjectURL(recordedBlob);
      preview.controls = true;
    };

    statusText.innerText = "📷 Camera Ready";

  }catch(err){
    alert("Camera permission denied ❌");
  }
}

/* ================= RECORD ================= */
recordBtn.onclick = async ()=>{
  if(!mediaRecorder){
    alert("Start camera first ❌");
    return;
  }

  // 🔥 STOP PREVIEW
  musicAudio.pause();
  previewBtn.innerText = "▶️ Preview Music";
  isPlaying = false;

  chunks=[];

  if(audioContext.state === "suspended"){
    await audioContext.resume();
  }

  mediaRecorder.start();

  if(musicAudio.src){
    musicAudio.currentTime = 0;
    musicAudio.play();
    statusText.innerText="🎥 Recording with music...";
  }else{
    statusText.innerText="🎥 Recording (voice only)...";
  }

  recordBtn.disabled=true;
  stopBtn.disabled=false;
};

/* ================= STOP ================= */
stopBtn.onclick = ()=>{
  mediaRecorder.stop();
  musicAudio.pause();

  recordBtn.disabled=false;
  stopBtn.disabled=true;
  statusText.innerText="✅ Recording Done";
};

/* ================= UPLOAD ================= */
async function uploadReel(){

  const token = localStorage.getItem("token");
  if(!token) return alert("Login first ❌");

  let file;

  if(recordedBlob){
    file = new File([recordedBlob],"reel.webm");
  }else{
    file = video.files[0];
  }

  if(!file) return alert("No video ❌");

  const fd = new FormData();
  fd.append("video",file);
  fd.append("businessName",FIXED_BUSINESS);
  fd.append("website",FIXED_WEBSITE);
  fd.append("whatsapp",FIXED_WHATSAPP);
  fd.append("lat",lat);
  fd.append("lng",lng);
  fd.append("city",city);

  const res = await fetch(API+"/reels/upload",{
    method:"POST",
    headers:{Authorization:"Bearer "+token},
    body:fd
  });

  const data = await res.json();

  if(!res.ok) return alert("❌ "+data.error);

  alert("✅ Upload Success 🚀");
}
</script>

</body>
</html>
