<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Upload</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  box-sizing: border-box;
}

button {
  background: #ff004f;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🚀 Reel Upload</h2>

<input type="file" id="video">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Website">

<p id="locationStatus">📍 Detecting location...</p>

<button id="uploadBtn">UPLOAD</button>

<script>

const API = "https://business-reels-backend.onrender.com";

// ✅ FIXED WHATSAPP
const FIXED_WHATSAPP = "919473549700";

let city = "";

/* ================= GET LOCATION ================= */
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async (pos) => {
      
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      console.log("📍 LAT:", lat, "LNG:", lng);

      // 👉 Reverse geocoding (simple city set)
      city = "UserCity"; // 🔥 You can replace with real API later

      document.getElementById("locationStatus").innerText = "📍 Location detected";

    }, () => {
      document.getElementById("locationStatus").innerText = "❌ Location permission denied";
    });
  } else {
    document.getElementById("locationStatus").innerText = "❌ Location not supported";
  }
}

getLocation();

/* ================= UPLOAD ================= */
async function uploadReel() {

  console.log("UPLOAD CLICKED");

  const file = document.getElementById("video").files[0];

  if (!file) {
    alert("❌ Select video file");
    return;
  }

  const businessName = document.getElementById("businessName").value;

  if (!businessName) {
    alert("❌ Business name required");
    return;
  }

  const formData = new FormData();
  formData.append("video", file);
  formData.append("businessName", businessName);
  formData.append("website", document.getElementById("website").value);

  // ✅ FIXED VALUES
  formData.append("whatsapp", FIXED_WHATSAPP);
  formData.append("city", city);

  console.log("📦 Sending...");

  try {
    const res = await fetch(API + "/reels/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log("RESPONSE:", data);

    if (!res.ok) {
      alert("❌ " + (data.error || "Upload failed"));
      return;
    }

    alert("✅ Upload Success");

  } catch (err) {
    console.log("ERROR:", err);
    alert("Upload failed");
  }
}

/* ================= BUTTON ================= */
document.getElementById("uploadBtn").addEventListener("click", uploadReel);

</script>

</body>
</html>
