<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Debug Final</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #111;
  color: #fff;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: #ff004f;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🚀 UPLOAD DEBUG FINAL</h2>

<!-- LOGIN -->
<h3>Login</h3>
<input type="text" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<hr>

<!-- UPLOAD -->
<input type="file" id="video">

<input type="text" id="businessName" placeholder="Business Name">
<input type="text" id="website" placeholder="Website">
<input type="text" id="category" placeholder="Category">
<input type="text" id="whatsapp" placeholder="WhatsApp">

<button onclick="uploadReel()">UPLOAD TEST</button>

<script>

const API = "https://business-reels-backend.onrender.com";
let token = null;

/* ================= LOAD TOKEN ================= */
function loadToken() {
  token = localStorage.getItem("token");
  console.log("🔑 TOKEN:", token);
}

/* ================= LOGIN FUNCTION ================= */
async function login() {
  console.log("LOGIN CLICKED");

  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();
    console.log("LOGIN RESPONSE:", data);

    if (data.token) {
      token = data.token;
      localStorage.setItem("token", token);
      alert("Login Successful ✅");
      console.log("TOKEN SAVED:", token);
    } else {
      alert(data.error || "Login failed ❌");
    }

  } catch (err) {
    console.log("LOGIN ERROR:", err);
    alert("Login request failed");
  }
}

/* ================= UPLOAD FUNCTION ================= */
async function uploadReel() {

  console.log("🟢 STEP 1 CLICKED");

  loadToken();

  if (!token) {
    alert("❌ Please login first");
    return;
  }

  const file = document.getElementById("video").files[0];

  if (!file) {
    alert("❌ Select file first");
    return;
  }

  console.log("FILE OK:", file.name);

  const formData = new FormData();
  formData.append("video", file);
  formData.append("businessName", document.getElementById("businessName").value);
  formData.append("website", document.getElementById("website").value);
  formData.append("category", document.getElementById("category").value);
  formData.append("whatsapp", document.getElementById("whatsapp").value);

  console.log("📦 SENDING REQUEST...");

  try {
    const res = await fetch(API + "/reels/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: formData
    });

    console.log("STATUS:", res.status);

    const data = await res.json();
    console.log("RESPONSE:", data);

    if (!res.ok) {
      alert("❌ ERROR: " + (data.error || "Upload failed"));
      return;
    }

    alert("✅ UPLOAD SUCCESS");

  } catch (err) {
    console.log("UPLOAD ERROR:", err);
    alert("Request failed");
  }
}

</script>

</body>
</html>
